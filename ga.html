<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祭改報名系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        body {
            background: #fff5f8;
            margin: 0;
            padding: 15px;
            max-width: 600px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        h2 {
            color: #8B0000;
            text-align: center;
            margin-top: 0;
            font-size: 22px;
        }
        .title {
            color: #8B0000;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        /* 🔥 高質感 大勾選框 + 一行兩列 */
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .checkbox-group label {
            background: #F8FAFC;
            padding: 12px 10px;
            border-radius: 8px;
            border: 1px solid #CBD5E1;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        button.secondary {
            background: #003366;
        }
        .msg {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            font-weight: bold;
        }
        .msg.success {
            background: #E6FFED;
            color: #006633;
        }
        .msg.error {
            background: #FFE6E6;
            color: #8B0000;
        }
        .list {
            margin-top: 10px;
            max-height: 380px;
            overflow-y: auto;
        }
        .item {
            padding: 12px 10px;
            border-bottom: 1px solid #F1F5F9;
            font-size: 15px;
        }
        .name {
            color: #8B0000;
            font-weight: bold;
        }
        .itemText {
            color: #003366;
        }
        .time {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }
        .admin-row {
            display: none;
            margin-top: 8px;
            gap: 6px;
        }
        .admin-row button {
            padding: 6px;
            font-size: 13px;
            width: 50%;
            border-radius: 6px;
        }

        /* 管理員按鈕 */
        .admin-btn {
            background: #B91C1C;
            font-size: 15px;
            padding: 12px;
            border-radius: 10px;
        }

        /* 🔥 浮窗視窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>☸️ 祭改報名系統 ☸️</h2>
    </div>

    <!-- 報名表單 -->
    <div class="card">
        <div class="title">報名者姓名</div>
        <input id="name" placeholder="請輸入姓名">
        
        <div class="title">📜 祭改項目（可多選）</div>
        <div class="checkbox-group" id="items"></div>
        
        <div class="title">✍️ 自行輸入項目（沒有再填）</div>
        <input id="customItem" placeholder="例：親人、債務、其它項目">

        <button id="submitBtn" onclick="submitSignup()">✅ 送出報名</button>
        <div id="msg" class="msg"></div>
    </div>

    <!-- 名單 -->
    <div class="card">
        <div class="title">📋 目前報名名單</div>
        <div id="list" class="list">載入中...</div>
    </div>

    <!-- 管理員按鈕 -->
    <div class="card">
        <button class="admin-btn" onclick="openModal()">🔑 管理員專區</button>
    </div>

    <!-- 🔥 浮窗登入 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 16px 0;">管理員驗證</h3>
            <input id="pwd" type="password" placeholder="請輸入管理員密碼">
            <button class="secondary" onclick="loginAdmin()">確認登入</button>
            <br><br>
            <button onclick="closeModal()" style="background:#666">取消</button>
        </div>
    </div>

<script>
    // ================= 設定 =================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWIZ3ID5K9PNgSJ20wwMZOiMIQ4dcDGm8M8FIU-u8sRqrzGdomM74OEREGPt2Fgxz8Og/exec";
    const ADMIN_PASSWORD = "ga123";

    // 祭改項目
    const WISH_ITEMS = [
        "補財庫", "冤親債主", "歷代祖先",
        "病符", "嬰靈", "陰纏", "祭小人",
        "車關", "倒房", "其他"
    ];

    let currentUserId = "";
    let currentDisplayName = "";
    let isAdmin = false;

    // 初始化
    window.onload = async function () {
        const box = document.getElementById("items");
        WISH_ITEMS.forEach(item => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
            box.appendChild(label);
        });

        try {
            await liff.init({ liffId: "2007416974-JzvPy6DZ" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                currentUserId = profile.userId;
                currentDisplayName = profile.displayName;
            }
        } catch (e) {}

        loadList();
    };

    // 送出報名
    async function submitSignup() {
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const custom = document.getElementById("customItem").value.trim();
        const checks = document.querySelectorAll(".checkbox-group input:checked");
        let items = Array.from(checks).map(c => c.value);

        if (custom) items.push(custom);
        if (!name) { showMsg("請輸入姓名", false); return; }
        if (items.length === 0) { showMsg("請至少選擇一個項目", false); return; }

        btn.disabled = true; btn.innerText = "⏳ 提交中...";
        try {
            const formData = new URLSearchParams();
            formData.append("name", name);
            formData.append("item", items.join("、"));
            formData.append("userId", currentUserId);
            formData.append("displayName", currentDisplayName);
            formData.append("mode", "write");

            const res = await fetch(WEB_APP_URL, { method: "POST", body: formData });
            const data = await res.json();
            if (data.success) {
                showMsg(data.message, true);
                document.getElementById("name").value = "";
                document.getElementById("customItem").value = "";
                document.querySelectorAll(".checkbox-group input").forEach(c => c.checked = false);
                loadList();
            } else {
                showMsg(data.message, false);
            }
        } catch (err) {
            showMsg("連線失敗，請重試", false);
        } finally {
            btn.disabled = false; btn.innerText = "✅ 送出報名";
        }
    }

    // 讀取列表
    function loadList() {
        const formData = new URLSearchParams();
        formData.append("mode", "read");

        fetch(WEB_APP_URL, { method: "POST", body: formData })
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("list");
            if (!data.success || data.records.length === 0) {
                list.innerHTML = "目前無報名資料";
                return;
            }
            let html = "";
            data.records.forEach(row => {
                const name = row[0] || "";
                const item = row[1] || "";
                const time = row[2] || "";
                html += `
                <div class="item">
                    <span class="name">${name}</span>
                    <span class="itemText">：${item}</span>
                    <div class="time">${time}</div>
                    <div class="admin-row">
                        <button style="background:#003366" onclick="editItem('${name}')">修改</button>
                        <button style="background:#cc0000" onclick="deleteItem('${name}')">刪除</button>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
            document.querySelectorAll(".admin-row").forEach(el => {
                el.style.display = isAdmin ? "flex" : "none";
            });
        });
    }

    // 🔥 浮窗
    function openModal() { document.getElementById("adminModal").style.display = "flex"; }
    function closeModal() { document.getElementById("adminModal").style.display = "none"; }

    // 🔥 管理員驗證 + 驗證成功才顯示功能
    function loginAdmin() {
        const pwd = document.getElementById("pwd").value.trim();
        if (pwd === ADMIN_PASSWORD) {
            verifyAdminUser(); // 驗證是否在管理員清單內
        } else {
            isAdmin = false;
            showMsg("❌ 密碼錯誤", false);
            closeModal();
        }
    }

    // 🔥 驗證 LINE USERID 是否在管理員試算表
    async function verifyAdminUser() {
        try {
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({
                    mode: "checkAdmin",
                    userId: currentUserId
                })
            });
            const data = await res.json();
            if (data.success) {
                isAdmin = true;
                showMsg("✅ 管理員驗證成功", true);
                loadList();
            } else {
                isAdmin = false;
                showMsg("❌ 您不是管理員", false);
            }
        } catch (e) {
            isAdmin = false;
            showMsg("❌ 驗證失敗", false);
        }
        closeModal();
    }

    // 功能
    function editItem(name) { if(!isAdmin)return; const newItem=prompt("修改項目：", ""); if(!newItem)return; fetch(WEB_APP_URL,{method:"POST",body:new URLSearchParams({mode:"write",name:name,item:newItem})}).then(()=>{showMsg("✅ 修改完成",true);loadList();}); }
    function deleteItem(name){ if(!isAdmin)return; if(!confirm("確定刪除？"))return; fetch(WEB_APP_URL,{method:"POST",body:new URLSearchParams({mode:"delete",name:name})}).then(()=>{showMsg("✅ 已刪除",true);loadList();}); }

    // 提示
    function showMsg(text, success) {
        const msg = document.getElementById("msg");
        msg.innerText = text;
        msg.className = "msg " + (success ? "success" : "error");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2800);
    }
</script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</body>
</html>
