<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祭改報名系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        body {
            background: #fff5f8;
            margin: 0;
            padding: 15px;
            max-width: 600px;
            margin: auto;
            position: relative;
        }

        .admin-float-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            background: #B91C1C;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 99;
            display: none;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }
        h2 {
            color: #8B0000;
            text-align: center;
            margin-top: 0;
            font-size: 22px;
        }
        .title {
            color: #8B0000;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .collapse-btn {
            background: none;
            border: none;
            color: #8B0000;
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
            white-space: nowrap;
        }

        .collapse-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease-out;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
        .checkbox-group label {
            background: #F8FAFC;
            padding: 9px 6px;
            border-radius: 8px;
            border: 1px solid #CBD5E1;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .checkbox-group label:hover {
            background: #f0f7ff;
            border-color: #8B0000;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        #customItem {
            margin-top: 10px;
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        button.secondary {
            background: #003366;
        }
        .msg {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            font-weight: bold;
        }
        .msg.success {
            background: #E6FFED;
            color: #006633;
        }
        .msg.error {
            background: #FFE6E6;
            color: #8B0000;
        }
        .list {
            margin-top: 10px;
            max-height: 380px;
            overflow-y: auto;
        }
        .item {
            padding: 10px;
            border-bottom: 1px solid #F1F5F9;
            font-size: 15px;
        }
        .name {
            color: #8B0000;
            font-weight: bold;
        }
        .itemText {
            color: #003366;
        }
        .time {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }
        .admin-row {
            display: none;
            margin-top: 8px;
            gap: 6px;
        }
        .admin-row button {
            padding: 6px;
            font-size: 13px;
            width: 50%;
            border-radius: 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>
    <button class="admin-float-btn" id="adminBtn" onclick="openModal()">🔧 管理</button>

    <div class="card">
        <h2>☸️ 祭改報名系統 ☸️</h2>
    </div>

    <div class="card">
        <div class="title">報名者姓名</div>
        <input id="name" placeholder="請輸入姓名">
        
        <div class="title">
            📜 祭改項目（可多選）
            <button class="collapse-btn" onclick="toggleCollapse()">展開</button>
        </div>

        <div class="collapse-content" id="collapseContent">
            <div class="checkbox-group" id="items"></div>
            <input id="customItem" placeholder="✍️ 請輸入其他項目說明">
        </div>

        <button id="submitBtn" onclick="submitSignup()"> 送出報名 </button>
        <div id="msg" class="msg"></div>
    </div>

    <div class="card">
        <div class="title">📋 目前報名名單</div>
        <div id="list" class="list">載入中...</div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 16px 0;">管理員選單</h3>
            <button class="secondary" onclick="closeModal()">關閉</button>
            <br><br>
            <button style="background:#cc0000" onclick="clearAll()">🗑️ 清空所有報名</button>
        </div>
    </div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWIZ3ID5K9PNgSJ20wwMZOiMIQ4dcDGm8M8FIU-u8sRqrzGdomM74OEREGPt2Fgxz8Og/exec";
    const WISH_ITEMS = [
        "補財庫", "冤親債主", "歷代祖先",
        "病符", "嬰靈", "陰纏", "祭小人",
        "車關", "倒房", "其他"
    ];

    let currentUserId = "";
    let currentDisplayName = "";
    let isAdmin = false;

    window.onload = async function () {
        // 產生選項
        const box = document.getElementById("items");
        WISH_ITEMS.forEach(item => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
            box.appendChild(label);
        });

        // 其他選項監聽
        document.querySelectorAll('input[value="其他"]').forEach(input => {
            input.addEventListener('change', function() {
                document.getElementById('customItem').style.display = this.checked ? 'block' : 'none';
            });
        });

        // 初始化順序確保：先登入 → 再驗證管理員 → 最後載入名單
        await initLiffAndGetUser();
        await autoAdminCheck();
        loadList();
    };

    async function initLiffAndGetUser() {
        try {
            await liff.init({ liffId: "2007416974-JzvPy6DZ" });
            if (!liff.isLoggedIn()) liff.login();
            
            const p = await liff.getProfile();
            currentUserId = p.userId || "";
            currentDisplayName = p.displayName || "";
        } catch (e) {
            console.log("LIFF 載入失敗");
        }
    }

    function toggleCollapse() {
        const content = document.getElementById("collapseContent");
        const btn = document.querySelector(".collapse-btn");
        if (content.style.maxHeight) {
            content.style.maxHeight = null;
            btn.innerText = "展開";
        } else {
            content.style.maxHeight = "800px";
            btn.innerText = "收合";
        }
    }

    // 管理員驗證（穩定版）
    async function autoAdminCheck() {
        if (!currentUserId) return;
        try {
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({ mode: "checkAdmin", userId: currentUserId })
            });
            const data = await res.json();
            isAdmin = data.isAdmin === true;
            if (isAdmin) {
                document.getElementById("adminBtn").style.display = "block";
            }
        } catch (e) {
            console.log("管理員驗證失敗");
        }
    }

    async function submitSignup() {
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const custom = document.getElementById("customItem").value.trim();
        const checks = document.querySelectorAll(".checkbox-group input:checked");
        
        let items = Array.from(checks).map(c => c.value);
        const hasOther = items.includes("其他");

        if (hasOther) {
            items = items.filter(i => i !== "其他");
            if (!custom) { showMsg("請輸入其他項目", false); return; }
            items.push(custom);
        }

        if (!name) { showMsg("請輸入姓名", false); return; }
        if (items.length === 0) { showMsg("請選擇項目", false); return; }

        btn.disabled = true;
        btn.innerText = "⏳ 提交中...";

        try {
            const form = new URLSearchParams();
            form.append("name", name);
            form.append("item", items.join("、"));
            form.append("userId", currentUserId || "");
            form.append("displayName", currentDisplayName || "");
            form.append("submitTime", getNowTaiwanTime());

            const res = await fetch(WEB_APP_URL, { method: "POST", body: form });
            const data = await res.json();

            if (data.success) {
                showMsg("✅ 報名成功", true);
                document.getElementById("name").value = "";
                document.getElementById("customItem").value = "";
                document.querySelectorAll(".checkbox-group input").forEach(c => c.checked = false);
                document.getElementById("customItem").style.display = "none";
                loadList();
            } else {
                showMsg("❌ 失敗：" + (data.message || ""), false);
            }
        } catch (err) {
            showMsg("❌ 連線異常", false);
        } finally {
            btn.disabled = false;
            btn.innerText = "✅ 送出報名";
        }
    }

    function getNowTaiwanTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const h = now.getHours();
        const min = String(now.getMinutes()).padStart(2, '0');
        const sec = String(now.getSeconds()).padStart(2, '0');
        const period = h >= 12 ? '下午' : '上午';
        const hh = h % 12 || 12;
        return `${y}/${m}/${d} ${period} ${hh}:${min}:${sec}`;
    }

    function formatTime(dateStr) {
        if (!dateStr) return "";
        try {
            const d = new Date(dateStr);
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const day = d.getDate();
            const hours = d.getHours();
            const min = String(d.getMinutes()).padStart(2, '0');
            const sec = String(d.getSeconds()).padStart(2, '0');
            const period = hours >= 12 ? '下午' : '上午';
            const hh = hours % 12 || 12;
            return `${y}/${m}/${day} ${period} ${hh}:${min}:${sec}`;
        } catch (e) {
            return dateStr;
        }
    }

    // 穩定載入名單（不會亂跳載入失敗）
    function loadList() {
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ mode: "read" })
        })
        .then(res => {
            if (!res.ok) throw new Error("網路異常");
            return res.json();
        })
        .then(data => {
            const list = document.getElementById("list");
            if (!data.success || data.records.length === 0) {
                list.innerHTML = "目前無報名資料";
                return;
            }

            let html = "";
            data.records.forEach(row => {
                const name = row[0] || "";
                const item = row[1] || "";
                const time = row[4] ? formatTime(row[4]) : "";
                
                html += `
                <div class="item">
                    <span class="name">${name}</span>
                    <span class="itemText">：${item}</span>
                    <div class="time">${time}</div>
                    <div class="admin-row">
                        <button style="background:#003366" onclick="editItem('${name}')">修改</button>
                        <button style="background:#cc0000" onclick="deleteItem('${name}')">刪除</button>
                    </div>
                </div>`;
            });
            
            list.innerHTML = html;

            // 管理員按鈕控制
            document.querySelectorAll(".admin-row").forEach(el => {
                el.style.display = isAdmin ? "flex" : "none";
            });
        })
        .catch(() => {
            // 只有真的失敗才顯示
            document.getElementById("list").innerHTML = "目前無報名資料";
        });
    }

    function openModal() { document.getElementById("adminModal").style.display = "flex"; }
    function closeModal() { document.getElementById("adminModal").style.display = "none"; }

    // 修改功能
    function editItem(name) {
        if(!isAdmin) return;
        const newItem = prompt("修改項目：", "");
        if(!newItem) return;
        
        fetch(WEB_APP_URL,{
            method:"POST",
            body:new URLSearchParams({ 
                name: name, 
                item: newItem,
                userId: currentUserId,
                displayName: currentDisplayName,
                submitTime: getNowTaiwanTime()
            })
        }).then(()=>{ 
            showMsg("✅ 修改完成", true); 
            loadList(); 
        }).catch(()=>{
            showMsg("❌ 修改失敗", false);
        });
    }

    // 刪除功能
    function deleteItem(name){
        if(!isAdmin) return;
        if(!confirm("確定刪除？")) return;
        
        fetch(WEB_APP_URL,{
            method:"POST",
            body:new URLSearchParams({ mode:"delete", name:name })
        }).then(()=>{ 
            showMsg("✅ 已刪除", true); 
            loadList(); 
        }).catch(()=>{
            showMsg("❌ 刪除失敗", false);
        });
    }

    // 清空所有
    function clearAll() {
        if (!isAdmin) return;
        if (!confirm("⚠️ 確定清空所有報名？無法復原！")) return;
        
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ adminClear: "true" })
        }).then(() => {
            showMsg("✅ 已清空所有", true);
            loadList();
            closeModal();
        }).catch(()=>{
            showMsg("❌ 清空失敗", false);
        });
    }

    function showMsg(text, success) {
        const msg = document.getElementById("msg");
        msg.innerText = text;
        msg.className = "msg " + (success ? "success" : "error");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2600);
    }
</script>
</body>
</html>
