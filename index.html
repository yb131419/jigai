<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬📿 祭改系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        body {
            background: #121212;
            margin: 0;
            padding: 15px;
            max-width: 600px;
            margin: auto;
            position: relative;
        }

        /* 標題區塊 + 管理按鈕 */
        .header-card {
            position: relative;
            padding-top: 25px;
            padding-bottom: 25px;
            background: linear-gradient(135deg, #2D2D2D, #1A1A1A);
            color: #E0CFC0;
        }

        /* 管理介面按鈕 */
        .admin-vertical-btn {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: #4A2C2A;
            color: #E0CFC0;
            border: none;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            z-index: 10;
            white-space: normal;
            line-height: 1.6;
            text-align: center;
            width: auto !important;
            min-width: unset !important;
            max-width: fit-content !important;
        }

        .card {
            background: #1E1E1E;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
            position: relative;
            border: 1px solid #333333;
        }
        h2 {
            color: #E0CFC0;
            text-align: center;
            margin-top: 0;
            font-size: 22px;
        }
        .title {
            color: #D4B59E;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444444;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            background: #2A2A2A;
            color: #E0E0E0;
        }
        input::placeholder {
            color: #888888;
        }

        .collapse-btn {
            background: none;
            border: none;
            color: #D4B59E;
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
            white-space: nowrap;
        }

        .collapse-content {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.4s ease-out;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
        .checkbox-group label {
            background: #252525;
            padding: 9px 6px;
            border-radius: 8px;
            border: 1px solid #444444;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            color: #E0E0E0;
        }
        .checkbox-group label:hover {
            background: #352523;
            border-color: #A0524D;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        #customItem {
            margin-top: 10px;
            display: none;
        }

        #submitBtn {
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #A0524D;
            color: #FFF;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        button.secondary {
            background: #3D5A73;
        }
        .msg {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            font-weight: bold;
        }
        .msg.success {
            background: #1B3B29;
            color: #A8E6CF;
        }
        .msg.error {
            background: #3B2121;
            color: #FFB3B3;
        }
        .list {
            margin-top: 10px;
            max-height: 380px;
            overflow-y: auto;
            color: #ffffff; /* 載入中文字白色 */
        }
        .item {
            padding: 10px;
            border-bottom: 1px solid #333333;
            font-size: 15px;
            color: #E0E0E0;
        }
        .name {
            color: #D4B59E;
            font-weight: bold;
        }
        .itemText {
            color: #A9B4D8;
        }
        .admin-row {
            display: flex;
            margin-top: 8px;
            gap: 6px;
        }

        /* 手機按鈕 */
        .admin-row button {
            padding: 6px 10px !important;
            font-size: 13px !important;
            width: auto !important;
            flex: 1;
            border-radius: 6px;
            white-space: nowrap;
        }

        /* 彈窗 */
        .modal {
            display: none !important;
            position: fixed !important;
            z-index: 9999 !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: rgba(0,0,0,0.7) !important;
            align-items: center !important;
            justify-content: center !important;
        }
        .modal.show {
            display: flex !important;
        }
        .modal-content {
            background-color: #222222 !important;
            color: #E0E0E0 !important;
            margin: auto !important;
            padding: 24px !important;
            border-radius: 16px !important;
            width: 90% !important;
            max-width: 400px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }

        /* 搜尋框 */
        #searchInput {
            margin-bottom: 10px;
            border: 1px solid #444444;
        }
    </style>
</head>

<body>

    <div class="card header-card">
        <h2>☸️ 祭改報名系統 ☸️</h2>
        <button class="admin-vertical-btn" onclick="openModal()">管理<br>介面</button>
    </div>

    <div class="card">
        <div class="title">報名者姓名</div>
        <input id="name" placeholder="請輸入姓名">
        
        <div class="title">
            📜 祭改項目（可多選）
            <button class="collapse-btn" onclick="toggleCollapse()">展開：▶</button>
        </div>

        <div class="collapse-content" id="collapseContent">
            <div class="checkbox-group" id="items"></div>
            <input id="customItem" placeholder="✍️ 請輸入其他項目說明">
        </div>

        <button id="submitBtn" onclick="submitSignup()"> 送出報名 </button>
        <div id="msg" class="msg"></div>
    </div>

    <div class="card">
        <div class="title">🔍 搜尋姓名 / 項目</div>
        <input type="text" id="searchInput" placeholder="請輸入關鍵字搜尋..." oninput="searchList()">
        
        <div class="title" style="margin-top:5px;">📋 目前報名名單</div>
        <div id="list" class="list">載入中...</div>
    </div>

    <!-- 管理員彈窗 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 16px 0;">管理員選單</h3>
            
            <button class="secondary" onclick="updateSheet2Date()">📅 修改『祭改日期』</button>
            <br><br>
            
            <button style="background:#cc0000" onclick="clearSheet1()">🗑️ 清空『祭改名單』</button>
            <br><br>
            
            <button class="secondary" onclick="closeModal()">關閉</button>
        </div>
    </div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWIZ3ID5K9PNgSJ20wwMZOiMIQ4dcDGm8M8FIU-u8sRqrzGdomM74OEREGPt2Fgxz8Og/exec";
    const WISH_ITEMS = [
        "補財庫", "冤親債主", "歷代祖先",
        "病符", "嬰靈", "陰纏", "祭小人",
        "車關", "倒房", "其他"
    ];

    let currentUserId = "";
    let currentDisplayName = "";
    let allRecords = [];
    let isAdminUser = false;

    // 全域防連點鎖
    let isProcessing = false;

    window.onload = async function () {
        const box = document.getElementById("items");
        WISH_ITEMS.forEach(item => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
            box.appendChild(label);
        });

        document.querySelectorAll('input[value="其他"]').forEach(input => {
            input.addEventListener('change', function() {
                document.getElementById('customItem').style.display = this.checked ? 'block' : 'none';
            });
        });

        await initLiffAndGetUser();
        loadList();
    };

    async function initLiffAndGetUser() {
        try {
            await liff.init({ liffId: "2007416974-JzvPy6DZ" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const p = await liff.getProfile();
            currentUserId = p.userId || "unknown_user";
            currentDisplayName = p.displayName || "unknown_name";
            
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({ mode: "checkAdmin", userId: currentUserId }),
                signal: AbortSignal.timeout(3000)
            });
            const data = await res.json();
            isAdminUser = data.isAdmin || false;
        } catch (e) {
            currentUserId = "error_user";
            currentDisplayName = "error_name";
            isAdminUser = false;
        }
    }

    function toggleCollapse() {
        const content = document.getElementById("collapseContent");
        const btn = document.querySelector(".collapse-btn");
        if (content.style.maxHeight) {
            content.style.maxHeight = null;
            btn.innerText = "展開：▶";
        } else {
            content.style.maxHeight = "800px";
            btn.innerText = "收合：▼";
        }
    }

    function getSignDate() {
        const now = new Date();
        const y = now.getFullYear();
        m = now.getMonth() + 1;
        d = now.getDate();
        return `${y}/${m}/${d}`;
    }

    function getFullDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        m = now.getMonth() + 1;
        d = now.getDate();
        
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const period = hours >= 12 ? "下午" : "上午";
        
        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;
        
        const timeStr = `${period} ${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        return `${y}/${m}/${d} ${timeStr}`;
    }

    async function submitSignup() {
        // 防連點
        if (isProcessing) {
            showMsg("⚠️ 請等待上一個動作完成", false);
            return;
        }

        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const custom = document.getElementById("customItem").value.trim();
        const checks = document.querySelectorAll(".checkbox-group input:checked");
        
        let items = Array.from(checks).map(c => c.value);
        const hasOther = items.includes("其他");

        if (hasOther) {
            items = items.filter(i => i !== "其他");
            if (!custom) { showMsg("請輸入其他項目", false); return; }
            items.push(custom);
        }

        if (!name) { showMsg("請輸入姓名", false); return; }
        if (items.length === 0) { showMsg("請選擇項目", false); return; }
        
        const isNameExist = allRecords.some(row => row[0]?.trim() === name);
        if (isNameExist) {
            showMsg("❌ 此姓名已報名過，無法重複報名", false);
            return;
        }

        // 啟用鎖
        isProcessing = true;
        btn.disabled = true;
        btn.innerText = "⏳ 提交中...";

        try {
            const form = new URLSearchParams();
            form.append("name", name);
            form.append("item", items.join("、"));
            form.append("userId", currentUserId);
            form.append("displayName", currentDisplayName);
            form.append("signDate", getSignDate());
            form.append("submitTime", getFullDateTime());

            const res = await fetch(WEB_APP_URL, { 
                method: "POST", 
                body: form
            });
            
            if (!res.ok) {
                showMsg("❌ 伺服器回應異常", false);
                return;
            }
            
            const data = await res.json();

            if (data.success) {
                showMsg("✅ 報名成功", true);
                document.getElementById("name").value = "";
                document.getElementById("customItem").value = "";
                document.querySelectorAll(".checkbox-group input").forEach(c => c.checked = false);
                document.getElementById("customItem").style.display = "none";
                loadList();
            } else {
                showMsg("❌ 失敗：" + (data.message || "報名失敗"), false);
            }
        } catch (err) {
            showMsg("❌ 連線異常", false);
        } finally {
            // 釋放鎖
            isProcessing = false;
            btn.disabled = false;
            btn.innerText = "✅ 送出報名";
        }
    }

    function loadList() {
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ mode: "read" }),
            signal: AbortSignal.timeout(5000)
        })
        .then(res => res.json())
        .then(data => {
            if (!data.success || data.records.length === 0) {
                document.getElementById("list").innerHTML = "目前無報名資料";
                allRecords = [];
                return;
            }
            allRecords = data.records;
            renderList(allRecords);
        })
        .catch(() => {
            document.getElementById("list").innerHTML = "目前無報名資料";
            allRecords = [];
        });
    }

    function renderList(records) {
        let html = "";
        records.forEach(row => {
            const name = row[0] || "";
            const item = row[1] || "";
            
            html += `
            <div class="item">
                <span class="name">${name}</span>
                <span class="itemText">：${item}</span>
                ${isAdminUser ? `
                <div class="admin-row">
                    <button style="background:#003366" onclick="editItem('${name}')">修改</button>
                    <button style="background:#cc0000" onclick="deleteItem('${name}')">刪除</button>
                </div>
                ` : ""}
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    function searchList() {
        const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!keyword) { renderList(allRecords); return; }
        const filtered = allRecords.filter(row => {
            const name = (row[0] || "").toLowerCase();
            const item = (row[1] || "").toLowerCase();
            return name.includes(keyword) || item.includes(keyword);
        });
        renderList(filtered);
    }

    function openModal() {
        document.getElementById("adminModal").classList.add("show");
    }
    function closeModal() {
        document.getElementById("adminModal").classList.remove("show");
    }

    async function editItem(name) {
        if (isProcessing) {
            showMsg("⚠️ 請等待上一個動作完成", false);
            return;
        }
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        
        const newItem = prompt("修改項目：", "");
        if(!newItem) return;

        isProcessing = true;
        showMsg("⏳ 修改中...", false);

        try {
            await fetch(WEB_APP_URL,{
                method:"POST",
                body:new URLSearchParams({ 
                    name: name, 
                    item: newItem,
                    userId: currentUserId,
                    displayName: currentDisplayName,
                    signDate: getSignDate()
                })
            });
            showMsg("✅ 修改完成", true); 
            loadList(); 
        } catch(e) {
            showMsg("❌ 修改失敗", false);
        } finally {
            isProcessing = false;
        }
    }

    async function deleteItem(name){
        if (isProcessing) {
            showMsg("⚠️ 請等待上一個動作完成", false);
            return;
        }
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        if(!confirm("確定刪除？")) return;

        isProcessing = true;
        showMsg("⏳ 刪除中...", false);

        try {
            await fetch(WEB_APP_URL,{
                method:"POST",
                body:new URLSearchParams({ mode:"delete", name:name })
            });
            showMsg("✅ 已刪除", true); 
            loadList(); 
        } catch(e) {
            showMsg("❌ 刪除失敗", false);
        } finally {
            isProcessing = false;
        }
    }

    async function updateSheet2Date() {
        if (isProcessing) {
            showMsg("⚠️ 請等待上一個動作完成", false);
            return;
        }
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        
        const input = prompt("請輸入新日期（範例：3月16日）", "");
        if (!input) return;
        const year = new Date().getFullYear();
        let month = input.match(/(\d+)月/)?.[1];
        let day = input.match(/(\d+)日/)?.[1];
        if (!month || !day) {
            showMsg("❌ 格式錯誤，請輸入 3月16日", false);
            return;
        }
        const newDate = `${year}/${month}/${day}`;

        isProcessing = true;
        showMsg("⏳ 日期更新中...", false);

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({ mode: "updateSheet2Date", newDate: newDate })
            });
            showMsg(`✅ 日期已更新：${newDate}`, true);
            closeModal();
        } catch(e) {
            showMsg("❌ 更新失敗", false);
        } finally {
            isProcessing = false;
        }
    }

    async function clearSheet1() {
        if (isProcessing) {
            showMsg("⚠️ 請等待上一個動作完成", false);
            return;
        }
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        if (!confirm("⚠️ 確定清空工作表1？無法復原！")) return;

        isProcessing = true;
        showMsg("⏳ 清空中...", false);

        try {
            const form = new URLSearchParams();
            form.append("mode", "clearSheet1");
            form.append("userId", currentUserId);
            
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: form
            });
            showMsg("✅ 已清空", true);
            loadList();
            closeModal();
        } catch(e) {
            showMsg("❌ 清空失敗", false);
        } finally {
            isProcessing = false;
        }
    }

    function showMsg(text, success) {
        const msg = document.getElementById("msg");
        msg.innerText = text;
        msg.className = "msg " + (success ? "success" : "error");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2800);
    }
</script>
</body>
</html>
