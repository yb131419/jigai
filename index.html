<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>彥彬📿 祭改系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1f2937;
      --bg-quaternary: #272e3b;
      --border-primary: #2c313a;
      --border-secondary: #374151;
      --text-primary: #f9fafb;
      --text-secondary: #e5e7eb;
      --text-tertiary: #9ca3af;
      --accent-green: #10b981;
      --accent-green-gradient: linear-gradient(to right, #10b981, #06c755);
      --accent-blue: #60a5fa;
      --accent-yellow: #facc15;
      --accent-red: #ef4444;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 6px 18px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 12px 30px rgba(0, 0, 0, 0.4);
      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.5;
      padding: 20px;
      min-height: 100vh;
      background-image: radial-gradient(circle at 10% 20%, rgba(30, 35, 45, 0.5) 0%, transparent 90%);
    }

    h1, h2 {
      text-align: center;
      color: var(--text-primary);
      font-weight: 700;
      position: relative;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 3px;
      background: var(--accent-green-gradient);
      margin: 12px auto 0;
      border-radius: 2px;
    }

    h2 {
      font-size: 1.8rem;
      margin-top: 40px;
    }

    h2::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--accent-blue);
      margin: 8px auto 0;
      border-radius: 2px;
    }

    form {
      max-width: 520px;
      margin: 0 auto 30px;
      background: linear-gradient(145deg, var(--bg-secondary), var(--bg-quaternary));
      padding: 30px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg), inset 0 0 1px rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-primary);
      position: relative;
      overflow: hidden;
    }

    form::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent-green-gradient);
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px 18px;
      margin-top: 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-secondary);
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 17px;
      transition: var(--transition-normal);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15), inset 0 0 1px var(--accent-blue);
      background-color: var(--bg-quaternary);
      transform: translateY(-1px);
    }

    input[type="text"]::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 28px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--accent-green-gradient);
      color: var(--text-primary);
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition-fast);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 250, 0.1), transparent);
      transition: 0.6s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }

    button:hover::before {
      left: 100%;
    }

    button:disabled {
      background: var(--border-secondary);
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .checkbox-grid label {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      transition: var(--transition-normal);
      margin-top: 0;
    }

    .checkbox-grid label:hover {
      background-color: var(--bg-quaternary);
      border-color: var(--accent-blue);
      transform: translateY(-2px);
      color: var(--text-primary);
    }

    .checkbox-grid input {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      cursor: pointer;
      accent-color: var(--accent-green);
    }

    #otherInput {
      display: none;
      margin-top: 10px;
    }

    #successMsg {
      text-align: center;
      margin-top: 20px;
      min-height: 28px;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
      font-size: 1.05rem;
      transition: var(--transition-normal);
    }

    table {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      border-collapse: collapse;
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      color: var(--text-primary);
      border: 1px solid var(--border-primary);
    }

    th, td {
      border-bottom: 1px solid var(--border-secondary);
      padding: 16px;
      text-align: center;
      font-size: 16px;
    }

    th {
      background: linear-gradient(180deg, var(--bg-secondary), var(--bg-tertiary));
      font-weight: 700;
      color: var(--accent-blue);
      position: relative;
    }

    th:last-child {
      border-left: 1px solid var(--border-secondary);
    }

    td {
      background-color: var(--bg-tertiary);
      transition: var(--transition-fast);
    }

    td:nth-child(2) {
      font-weight: 600;
      color: var(--accent-yellow);
      text-shadow: 0 0 6px rgba(250, 204, 21, 0.3);
      border-left: 1px solid var(--border-secondary);
    }

    tr:hover td {
      background-color: var(--bg-quaternary);
      transform: scale(1.01);
    }

    tr:last-child td {
      border-bottom: none;
    }

    #loadingRecords {
      text-align: center;
      color: var(--text-tertiary);
      font-style: italic;
      margin-top: 10px;
      font-size: 1rem;
      position: relative;
    }

    #loadingRecords::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-tertiary);
      border-top: 2px solid var(--accent-green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #totalCount {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-blue);
      margin-top: 15px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      body { padding: 15px; }
      h1 { font-size: 1.8rem; }
      h2 { font-size: 1.5rem; }
      form { padding: 24px; }
      .checkbox-grid { gap: 12px; }
      button { padding: 14px; font-size: 17px; }
    }

    .top-bar {
      position: fixed;
      top: 12px;
      right: 15px;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-switch {
      display: none;
    }
    .switch-btn {
      padding: 10px 18px;
      border-radius: 50px;
      background: #161b22;
      border: 1px solid #374151;
      color: #60a5fa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .switch-btn:hover {
      transform: translateY(-2px);
      background: #1f2937;
      border-color: #60a5fa;
    }
    .admin-section {
      display: none;
      max-width: 520px;
      margin: 0 auto 30px;
    }
    .access-denied {
      text-align: center;
      padding: 30px 20px;
      color: #ef4444;
      font-weight: 600;
      font-size: 1rem;
      background: #1f2937;
      border-radius: 16px;
      margin: 15px 0;
      border: 1px solid #374151;
      display: none;
    }
    .admin-card {
      background: #161b22;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.3);
      border: 1px solid #2c313a;
    }
    .reservation-item {
      padding: 16px;
      border-radius: 12px;
      background: #1f2937;
      margin-bottom: 12px;
      border: 1px solid #374151;
      transition: all 0.3s ease;
    }
    .reservation-item:hover {
      background: #272e3b;
      border-color: #60a5fa;
    }
    .reserve-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }
    .reserve-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .reserve-num {
      font-size: 0.9rem;
      color: #60a5fa;
      font-weight: 900;
      min-width: 28px;
      text-align: center;
    }
    .reserve-check {
      transform: scale(1.5);
      width: auto;
      height: auto;
      margin: 0;
    }
    .reserve-btns {
      display: flex;
      gap: 8px;
    }
    .reserve-btns button {
      height: 36px;
      min-width: 60px;
      font-size: 0.85rem;
      border-radius: 8px;
      margin-top: 0;
      padding: 0 12px;
    }
    .batch-delete-btn {
      background: #ef4444 !important;
      margin-top: 15px !important;
    }
    .search-box {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #f9fafb;
      margin-bottom: 15px;
      font-size: 1rem;
    }
    .search-box:focus {
      outline: none;
      border-color: #60a5fa;
      background: #272e3b;
    }
    .empty-state {
      text-align: center;
      padding: 30px 10px;
      color: #9ca3af;
      font-size: 0.95rem;
    }
    .loader {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-bottom-color: transparent;
      border-radius: 50%;
      animation: rotation 1s linear infinite;
      display: none;
      margin: auto;
    }
    button.loading .loader {
      display: block;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      color: var(--text-primary);
      font-size: 15px;
    }
    .page-btn {
      padding: 8px 14px;
      border-radius: 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-secondary);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition-fast);
    }
    .page-btn:hover:not(:disabled) {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }
    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="page-switch" id="switchContainer">
    <button class="switch-btn" id="switchBtn">切換管理介面</button>
  </div>
</div>

<div id="userPage">
  <h1>📝 祭改報名</h1>

  <form id="myForm">
    <label for="nameInput">姓名</label>
    <input type="text" id="nameInput" name="name" autocomplete="off" required />

    <label><i class="ri-book-line"></i> 📜 祭改項目（可多選）</label>
    <div class="checkbox-grid">
      <label><input type="checkbox" name="item" value="補財庫">補財庫</label>
      <label><input type="checkbox" name="item" value="冤親債主">冤親債主</label>
      <label><input type="checkbox" name="item" value="歷代祖先">歷代祖先</label>
      <label><input type="checkbox" name="item" value="病符">病符</label>
      <label><input type="checkbox" name="item" value="嬰靈">嬰靈</label>
      <label><input type="checkbox" name="item" value="陰纏">陰纏</label>
      <label><input type="checkbox" name="item" value="祭小人">祭小人</label>
      <label><input type="checkbox" name="item" value="車關">車關</label>
      <label><input type="checkbox" name="item" value="倒房">倒房</label>
      <label><input type="checkbox" name="item" value="其他" id="chkOther">其他</label>
    </div>
    <input type="text" id="otherInput" placeholder="請輸入其他項目" />

    <button type="submit" id="submitBtn">
      <i class="ri-send-plane-line"></i> 送出報名
    </button>
  </form>

  <div id="successMsg"></div>

  <h2>📋 祭改名單</h2>
  <p id="totalCount">總報名人數：0</p>
  <p id="loadingRecords">讀取中...</p>

  <table id="recordsTable" style="display:none;">
    <thead>
      <tr>
        <th>姓名</th>
        <th>項目</th>
      </tr>
    </thead>
    <tbody id="recordsBody"></tbody>
  </table>
</div>

<div id="adminPage" class="admin-section">
  <h2>🔐 祭改管理後台</h2>
  <div id="adminAccessDenied" class="access-denied">
    ❌ 您無管理員權限<br>請聯繫管理員開通權限
  </div>

  <div id="adminContent" style="display:none;">
    <div class="admin-card">
      <input 
        type="text" 
        id="searchInput" 
        class="search-box" 
        placeholder="🔍 搜尋：祭改者 / 祭改項目"
        oninput="renderRecordsList(window.fullRecords || [])"
      >

      <button class="admin-btn" id="loadRecordsBtn" style="margin-top:0;">
        <span class="loader"></span>
        <span>重新載入名單</span>
      </button>
      
      <button class="admin-btn" id="clearAllBtn" style="margin-top:10px; background:var(--accent-red);">
        <span class="loader"></span>
        <span>工作表1 全部清除</span>
      </button>

      <div id="recordsList" style="margin:15px 0;"></div>
      <div id="pagination" class="pagination"></div>
      <button class="batch-delete-btn" id="batchDeleteBtn">
        <span class="loader"></span>
        <span>刪除選取資料</span>
      </button>
    </div>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxzLkjKUrz3DZIT7k0KHkY7QGjz0bp1eXRtcG7O5mryJr1IJQJlU-v3gyOJEaeVypvT/exec";
const LIFF_ID = "2007416974-JzvPy6DZ";
let userId = "", displayName = "";
let isAdmin = false;
let currentPage = "user";
let selectedItems = [];
let isAdminLoading = false;
let fullRecords = [];
let isSubmitting = false;

let page = 1;
const pageSize = 5;

let switchBtn, switchContainer, userPage, adminPage;
let adminContent, adminAccessDenied;
let loadRecordsBtn, batchDeleteBtn, clearAllBtn;
let form, nameInput, chkOther, otherInput, successMsg;
let loadingRecords, recordsTable, recordsBody, totalCount;
let submitBtn;

function togglePage() {
  currentPage = currentPage === "user" ? "admin" : "user";
  userPage.style.display = currentPage === "user" ? "block" : "none";
  adminPage.style.display = currentPage === "admin" ? "block" : "none";
  switchBtn.textContent = currentPage === "admin" ? "返回報名頁面" : "切換管理介面";
  
  if(currentPage === "admin"){
    page = 1;
    loadAllRecords();
  }
}

function setAdminLoading(loading, btn = null) {
  isAdminLoading = loading;
  if (btn) {
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }
}

async function checkAdminByBackend() {
  if(!userId) return;
  try {
    const res = await fetch(`${scriptURL}?action=checkAdmin&lineId=${userId}&_=${Date.now()}`);
    const data = await res.json();
    isAdmin = data.isAdmin || false;
  } catch (e) {
    isAdmin = false;
  }

  if(isAdmin){
    switchContainer.style.display = "block";
    adminAccessDenied.style.display = "none";
    adminContent.style.display = "block";
  } else {
    switchContainer.style.display = "none";
    adminAccessDenied.style.display = "block";
    adminContent.style.display = "none";
  }
}

function loadAllRecords() {
  if(!isAdmin || isAdminLoading) return;
  setAdminLoading(true, loadRecordsBtn);
  
  fetch(scriptURL + "?mode=read&_="+Date.now())
  .then(res => res.text())
  .then(text => {
    try {
      const data = JSON.parse(text);
      fullRecords = Array.isArray(data.records) ? data.records : [];
    } catch (e) {
      fullRecords = [];
    }
    renderRecordsList(fullRecords);
  })
  .catch(() => {
    fullRecords = [];
    renderRecordsList(fullRecords);
  })
  .finally(() => {
    setAdminLoading(false, loadRecordsBtn);
  });
}

function renderRecordsList(list) {
  const keyword = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  let filtered = list || [];
  
  if(keyword){
    filtered = filtered.filter(item => 
      (item[0]?.toLowerCase().includes(keyword) || "") || 
      (item[1]?.toLowerCase().includes(keyword) || "")
    );
  }
  
  const total = filtered.length;
  const totalPages = Math.ceil(total / pageSize);
  if(page < 1) page = 1;
  if(page > totalPages && totalPages > 0) page = totalPages;
  
  const start = (page - 1) * pageSize;
  const end = start + pageSize;
  const paginatedData = filtered.slice(start, end);
  
  const container = document.getElementById('recordsList');
  const pagination = document.getElementById('pagination');
  
  if(!paginatedData.length){
    container.innerHTML = '<div class="empty-state">無資料</div>';
    pagination.innerHTML = '';
    return;
  }
  
  container.innerHTML = paginatedData.map((item, idx) => `
    <div class="reservation-item">
      <div class="reserve-header">
        <div class="reserve-left">
          <span class="reserve-num">${start + idx + 1}</span>
          <input type="checkbox" class="reserve-check" value="${start + idx}" onchange="toggleSelect('${start + idx}')">
        </div>
        <div class="reserve-btns">
          <button onclick='editRecord(${start + idx}, ${JSON.stringify(item)})'>
            <span class="loader"></span>修改
          </button>
          <button class="batch-delete-btn" onclick="deleteRecord('${start + idx}')">
            <span class="loader"></span>刪除
          </button>
        </div>
      </div>
      <div style="color:#e5e7eb; font-size:0.9rem; padding-top:8px; line-height:1.6;">
        祭改者：${item[0] || ''}<br>
        祭改項目：${item[1] || ''}<br>
        填表者：${item[3] || ''}<br>
        報名時間：${item[4] || ''}
      </div>
    </div>
  `).join('');
  
  pagination.innerHTML = `
    <button class="page-btn" onclick="prevPage()" ${page === 1 ? 'disabled' : ''}>上一頁</button>
    <span>${page} / ${totalPages}</span>
    <button class="page-btn" onclick="nextPage()" ${page === totalPages ? 'disabled' : ''}>下一頁</button>
  `;
}

function prevPage() {
  if(page <= 1) return;
  page--;
  renderRecordsList(fullRecords);
}

function nextPage() {
  const total = fullRecords.length;
  const totalPages = Math.ceil(total / pageSize);
  if(page >= totalPages) return;
  page++;
  renderRecordsList(fullRecords);
}

function toggleSelect(id) {
  const i = selectedItems.indexOf(id);
  i > -1 ? selectedItems.splice(i, 1) : selectedItems.push(id);
}

async function editRecord(id, item) {
  if(!isAdmin || isAdminLoading) return;
  
  const newName = prompt("修改祭改者", item[0] || "");
  const newItem = prompt("修改祭改項目", item[1] || "");
  const newDate = prompt("修改報名時間", item[4] || '');
  
  if(!newName || !newItem){
    alert("請填寫完整資訊");
    return;
  }
  
  if(!confirm("確認修改？")) return;
  
  setAdminLoading(true);
  const params = new URLSearchParams();
  params.append("mode", "adminUpdate");
  params.append("id", id);
  params.append("name", newName);
  params.append("item", newItem);
  params.append("date", newDate);
  params.append("lineId", userId);
  
  try {
    await fetch(scriptURL, { method: "POST", body: params });
    alert("修改成功");
    loadAllRecords();
    loadRecords();
  } catch (e) {
    alert("修改失敗");
  } finally {
    setAdminLoading(false);
  }
}

async function deleteRecord(id) {
  if(!isAdmin || isAdminLoading || !confirm("確定刪除？")) return;
  
  setAdminLoading(true);
  const params = new URLSearchParams();
  params.append("mode", "adminDelete");
  params.append("id", id);
  params.append("lineId", userId);
  
  try {
    await fetch(scriptURL, { method: "POST", body: params });
    alert("刪除成功");
    loadAllRecords();
    loadRecords();
  } catch (e) {
    alert("刪除失敗");
  } finally {
    setAdminLoading(false);
  }
}

async function batchDeleteRecords() {
  if(!isAdmin || isAdminLoading || selectedItems.length === 0 || !confirm(`確定刪除 ${selectedItems.length} 筆？`)) return;
  
  setAdminLoading(true, batchDeleteBtn);
  let success = 0;
  let total = selectedItems.length;

  for (let id of selectedItems) {
    try {
      const params = new URLSearchParams();
      params.append("mode", "adminDelete");
      params.append("id", id);
      params.append("lineId", userId);
      await fetch(scriptURL, { method: "POST", body: params });
      success++;
    } catch (e) {}
  }
  
  alert(`成功刪除 ${success} 筆`);
  selectedItems = [];
  loadAllRecords();
  loadRecords();
  setAdminLoading(false, batchDeleteBtn);
}

async function clearAllSheet1() {
  if(!isAdmin || isAdminLoading || !confirm("確定清除工作表1所有資料？此操作無法復原！")) return;
  setAdminLoading(true, clearAllBtn);
  
  const params = new URLSearchParams();
  params.append("mode", "clearAll");
  params.append("lineId", userId);
  
  try {
    await fetch(scriptURL, { method: "POST", body: params });
    alert("工作表1已全部清除");
    loadAllRecords();
    loadRecords();
  } catch (e) {
    alert("清除失敗");
  } finally {
    setAdminLoading(false, clearAllBtn);
  }
}

window.onload = () => {
  switchBtn = document.getElementById('switchBtn');
  switchContainer = document.getElementById('switchContainer');
  userPage = document.getElementById('userPage');
  adminPage = document.getElementById('adminPage');
  adminContent = document.getElementById('adminContent');
  adminAccessDenied = document.getElementById('adminAccessDenied');
  loadRecordsBtn = document.getElementById('loadRecordsBtn');
  batchDeleteBtn = document.getElementById('batchDeleteBtn');
  clearAllBtn = document.getElementById('clearAllBtn');
  
  form = document.getElementById("myForm");
  nameInput = document.getElementById("nameInput");
  chkOther = document.getElementById("chkOther");
  otherInput = document.getElementById("otherInput");
  successMsg = document.getElementById("successMsg");
  loadingRecords = document.getElementById("loadingRecords");
  recordsTable = document.getElementById("recordsTable");
  recordsBody = document.getElementById("recordsBody");
  totalCount = document.getElementById("totalCount");
  submitBtn = document.getElementById("submitBtn");

  switchBtn.onclick = togglePage;
  loadRecordsBtn.onclick = loadAllRecords;
  batchDeleteBtn.onclick = batchDeleteRecords;
  clearAllBtn.onclick = clearAllSheet1;

  liff.init({ liffId: LIFF_ID })
    .then(async () => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();
      if(profile){
        userId = profile.userId;
        displayName = profile.displayName;
        await checkAdminByBackend();
      }
      loadRecords();
    })
    .catch(err => {
      console.log("LIFF 初始化失敗：", err);
      loadRecords();
    });

  chkOther.addEventListener("change", () => {
    otherInput.style.display = chkOther.checked ? "block" : "none";
    if (!chkOther.checked) otherInput.value = "";
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    if(isSubmitting) return;
    isSubmitting = true;
    submitBtn.disabled = true;
    
    successMsg.textContent = "";
    successMsg.style.color = "";
    const name = nameInput.value.trim();

    if (!name) {
      successMsg.style.color = "var(--accent-red)";
      successMsg.textContent = "請輸入姓名";
      isSubmitting = false;
      submitBtn.disabled = false;
      return;
    }

    let selectedItems = Array.from(document.querySelectorAll('input[name="item"]:checked'))
      .map(cb => cb.value)
      .filter(v => v !== "其他");

    if (chkOther.checked) {
      const otherVal = otherInput.value.trim();
      if (otherVal) selectedItems.push(otherVal);
    }

    if (selectedItems.length === 0) {
      successMsg.style.color = "var(--accent-red)";
      successMsg.textContent = "請選擇至少一個項目";
      isSubmitting = false;
      submitBtn.disabled = false;
      return;
    }

    try {
      const res = await fetch(scriptURL + "?mode=read&_="+Date.now());
      const text = await res.text();
      const data = JSON.parse(text);
      const records = Array.isArray(data.records) ? data.records : [];
      
      const exists = records.some(r => (r[0] || "").trim().toLowerCase() === name.trim().toLowerCase());
      
      if (exists) {
        successMsg.style.color = "var(--accent-red)";
        successMsg.textContent = "❌ 此姓名已報名，不可重複";
        isSubmitting = false;
        submitBtn.disabled = false;
        return;
      }

      const itemString = selectedItems.join("、");
      const formData = new URLSearchParams();
      formData.append("name", name);
      formData.append("item", itemString);
      formData.append("userId", userId);
      formData.append("displayName", displayName);

      successMsg.textContent = "送出中...";

      const response = await fetch(scriptURL, {
        method: "POST",
        body: formData
      });
      
      const result = await response.json();
      
      if (result.success) {
        successMsg.style.color = "var(--accent-green)";
        successMsg.innerHTML = `✅ 報名成功！<br>姓名：<strong>${name}</strong>`;
        form.reset();
        otherInput.style.display = "none";
        loadRecords();
      } else {
        successMsg.style.color = "var(--accent-red)";
        successMsg.textContent = "❌ " + (result.message || "報名失敗");
      }
      
    } catch (err) {
      successMsg.style.color = "var(--accent-red)";
      successMsg.textContent = "✅ 報名成功！（後端同步中）";
      form.reset();
      otherInput.style.display = "none";
      loadRecords();
    } finally {
      isSubmitting = false;
      submitBtn.disabled = false;
    }
  });
};

function loadRecords() {
  loadingRecords.style.display = "block";
  recordsTable.style.display = "none";
  recordsBody.innerHTML = "";

  fetch(scriptURL + "?mode=read&_="+Date.now())
  .then(res => res.text())
  .then(text => {
    try {
      const data = JSON.parse(text);
      const records = Array.isArray(data.records) ? data.records : [];
      totalCount.textContent = `總報名人數：${records.length}`;
      
      if (records.length > 0) {
        renderRecords(records);
      } else {
        loadingRecords.textContent = "目前沒有報名資料";
      }
    } catch (e) {
      loadingRecords.textContent = "目前沒有報名資料";
      totalCount.textContent = "總報名人數：0";
    }
  })
  .catch(() => {
    loadingRecords.textContent = "目前沒有報名資料";
    totalCount.textContent = "總報名人數：0";
  });
}

function renderRecords(records) {
  loadingRecords.style.display = "none";
  recordsTable.style.display = "table";
  recordsBody.innerHTML = "";

  [...records].reverse().forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item[0] || ''}</td>
      <td>${item[1] || ''}</td>
    `;
    recordsBody.appendChild(tr);
  });
}
</script>
