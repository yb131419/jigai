<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬📿 祭改系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        body {
            background: #0F0F0F;
            background-image: radial-gradient(circle at 50% 10%, rgba(44,28,20,0.3) 0%, transparent 35%),
                              radial-gradient(circle at 80% 80%, rgba(30,20,15,0.4) 0%, transparent 40%);
            margin: 0;
            padding: 18px;
            max-width: 600px;
            margin: auto;
            position: relative;
            min-height: 100vh;
        }

        /* 頂級質感標題區 */
        .header-card {
            position: relative;
            padding: 32px 20px;
            background: linear-gradient(155deg, #2D2420, #1C1612);
            color: #E0CFC0;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .header-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(224,207,192,0.2), transparent);
        }

        /* 管理按鈕 - 文字更小、框剛好包住文字 */
        .admin-vertical-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #5C3A37, #4A2C2A);
            color: #E0CFC0;
            border: none;
            border-radius: 10px;
            padding: 6px 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.06);
            z-index: 10;
            white-space: normal;
            line-height: 1.3;
            text-align: center;
            width: auto !important;
            min-width: unset !important;
            max-width: fit-content !important;
            display: none;
            transition: all 0.25s ease;
        }
        .admin-vertical-btn:hover {
            transform: translateY(-50%) scale(1.03);
            box-shadow: 0 3px 10px rgba(0,0,0,0.35);
        }

        /* 頂級質感卡片 */
        .card {
            background: linear-gradient(140deg, #1E1A18, #181411);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
            border: none;
        }
        h2 {
            color: #E0CFC0;
            text-align: center;
            margin: 0;
            font-size: 26px;
            letter-spacing: 1px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .title {
            color: #D4B59E;
            font-weight: bold;
            margin-bottom: 14px;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* 頂級輸入框 */
        input {
            width: 100%;
            padding: 15px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            font-size: 16px;
            margin-bottom: 14px;
            background: rgba(30,26,24,0.6);
            color: #E0E0E0;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }
        input:focus {
            outline: none;
            border-color: rgba(160,82,77,0.4);
            background: rgba(36,30,28,0.8);
            box-shadow: 0 0 0 3px rgba(160,82,77,0.15);
        }
        input::placeholder {
            color: #777777;
        }

        /* 折疊按鈕 */
        .collapse-btn {
            background: none;
            border: none;
            color: #D4B59E;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            white-space: nowrap;
            transition: 0.2s;
        }
        .collapse-btn:hover {
            color: #E0CFC0;
        }

        .collapse-content {
            overflow: hidden;
            max-height: 800px;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 頂級核取方塊群組 + 字體放大 */
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .checkbox-group label {
            background: rgba(30,26,24,0.7);
            padding: 14px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
            color: #E0E0E0;
            backdrop-filter: blur(4px);
        }
        .checkbox-group label:hover {
            background: rgba(44,32,30,0.8);
            border-color: rgba(160,82,77,0.35);
            transform: translateY(-1px);
        }
        .checkbox-group input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin: 0;
            accent-color: #A0524D;
        }

        #customItem {
            margin-top: 12px;
            display: none;
        }

        #submitBtn {
            margin-top: 24px;
        }

        /* 頂級按鈕 */
        button {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, #B86B5F, #A0524D);
            color: #FFF;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(160,82,77,0.25);
            letter-spacing: 0.5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(160,82,77,0.35);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        button.secondary {
            background: linear-gradient(135deg, #4A6A8C, #3D5A73);
            box-shadow: 0 4px 15px rgba(61,90,115,0.2);
        }
        button.secondary:hover {
            box-shadow: 0 6px 20px rgba(61,90,115,0.28);
        }

        /* 訊息提示 */
        .msg {
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            margin: 14px 0;
            display: none;
            font-weight: bold;
            backdrop-filter: blur(6px);
        }
        .msg.success {
            background: rgba(27,59,41,0.8);
            color: #A8E6CF;
            border: 1px solid rgba(168,230,207,0.15);
        }
        .msg.error {
            background: rgba(59,33,33,0.8);
            color: #FFB3B3;
            border: 1px solid rgba(255,179,179,0.15);
        }

        /* 名單區塊 */
        .list {
            margin-top: 12px;
            max-height: 420px;
            overflow-y: auto;
            color: #ffffff;
            padding-right: 4px;
        }
        .list::-webkit-scrollbar {
            width: 6px;
        }
        .list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
        }
        .item {
            padding: 14px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 16px;
            color: #E0E0E0;
            transition: 0.2s;
        }
        .item:hover {
            background: rgba(255,255,255,0.03);
        }
        .name {
            color: #D4B59E;
            font-weight: bold;
            font-size: 17px;
        }
        .itemText {
            color: #A9B4D8;
        }

        /* 管理按鈕列 */
        .admin-row {
            display: flex;
            margin-top: 10px;
            gap: 8px;
        }
        .admin-row button {
            padding: 10px 12px !important;
            font-size: 15px !important;
            width: auto !important;
            flex: 1;
            border-radius: 10px;
            white-space: nowrap;
            font-weight: normal;
            transition: all 0.2s ease;
        }
		.admin-row button:hover {
			transform: scale(1.03);
		}

        /* 頂級彈窗 */
        .modal {
            display: none !important;
            position: fixed !important;
            z-index: 9999 !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: rgba(0,0,0,0.85) !important;
            align-items: center !important;
            justify-content: center !important;
            backdrop-filter: blur(6px) !important;
        }
        .modal.show {
            display: flex !important;
        }
        .modal-content {
            background: linear-gradient(140deg, #24201D, #1A1613) !important;
            color: #E0E0E0 !important;
            margin: auto !important;
            padding: 32px 28px !important;
            border-radius: 24px !important;
            width: 90% !important;
            max-width: 420px !important;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            position: relative;
        }

        /* 搜尋框 */
        #searchInput {
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
		
		/* 載入名單按鈕：剛好包住文字大小 */
		.refresh-top-btn {
			position: absolute;
			right: 24px;
			top: 24px;
			background: linear-gradient(135deg, #3D735C, #2D5A43);
			color: #fff;
			border: none;
			border-radius: 8px;
			padding: 5px 9px;
			font-size: 13px;
			cursor: pointer;
            white-space: nowrap;
            width: fit-content;
		}
    </style>
</head>

<body>

    <div class="card header-card">
        <h2>☸️ 祭改報名系統 ☸️</h2>
        <button class="admin-vertical-btn" id="adminBtn" onclick="openModal()">管<br>理</button>
    </div>

    <div class="card">
        <div class="title">報名者姓名</div>
        <input id="name" placeholder="請輸入姓名">
        
        <div class="title">
            📜 祭改項目（可多選）
            <button class="collapse-btn" onclick="toggleCollapse()">收合：▼</button>
        </div>

        <div class="collapse-content" id="collapseContent">
            <div class="checkbox-group" id="items"></div>
            <input id="customItem" placeholder="✍️ 請輸入其他項目說明">
        </div>

        <button id="submitBtn" onclick="submitSignup()"> 送出報名 </button>
        <div id="msg" class="msg"></div>
    </div>

    <div class="card">
        <div class="title">🔍 搜尋姓名 / 項目</div>
        <input type="text" id="searchInput" placeholder="請輸入關鍵字搜尋..." oninput="searchList()">
        
        <div class="title" style="margin-top:5px;">📋 目前報名名單</div>
        <div id="list" class="list">載入中...</div>
    </div>

    <!-- 管理員彈窗 -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin:0 0 20px 0; color:#E0CFC0;">管理員選單</h3>
            
            <button class="secondary" onclick="openListManager()">📋 名單管理</button>
            <br><br>
            
            <button class="secondary" onclick="updateSheet2Date()">📅 修改『祭改日期』</button>
            <br><br>
            
            <button style="background:linear-gradient(135deg,#D83A56,#cc0000)" onclick="clearSheet1()">🗑️ 清空『祭改名單』</button>
            <br><br>
            
            <button class="secondary" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <!-- 名單管理彈窗（新增） -->
    <div id="listManagerModal" class="modal">
        <div class="modal-content">
			<button class="refresh-top-btn" onclick="refreshManagerList()">🔄 載入名單</button>
            <h3 style="text-align:center; margin:0 0 16px 0; color:#E0CFC0;">📋 名單管理</h3>
            
            <input type="text" id="managerSearch" placeholder="🔍 搜尋姓名/項目" oninput="searchManagerList()">
            <div id="managerList" class="list" style="max-height:380px; margin-top:10px;">載入中...</div>
            
            <br>
            <button class="secondary" onclick="closeListManager()">關閉</button>
        </div>
    </div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWIZ3ID5K9PNgSJ20wwMZOiMIQ4dcDGm8M8FIU-u8sRqrzGdomM74OEREGPt2Fgxz8Og/exec";
    const WISH_ITEMS = [
        "補財庫", "冤親債主", "歷代祖先",
        "病符", "嬰靈", "陰纏", "祭小人",
        "車關", "倒房", "其他"
    ];

    let currentUserId = "";
    let currentDisplayName = "";
    let allRecords = [];
    let isAdminUser = false;

    window.onload = async function () {
        const box = document.getElementById("items");
        WISH_ITEMS.forEach(item => {
            const label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" value="${item}"> ${item}`;
            box.appendChild(label);
        });

        document.querySelectorAll('input[value="其他"]').forEach(input => {
            input.addEventListener('change', function() {
                document.getElementById('customItem').style.display = this.checked ? 'block' : 'none';
            });
        });

        await initLiffAndGetUser();
        loadList();
    };

    async function initLiffAndGetUser() {
        try {
            await liff.init({ liffId: "2007416974-JzvPy6DZ" });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const p = await liff.getProfile();
            currentUserId = p.userId || "unknown_user";
            currentDisplayName = p.displayName || "unknown_name";
            
            const res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: new URLSearchParams({ mode: "checkAdmin", userId: currentUserId })
            });
            const data = await res.json();
            isAdminUser = data.isAdmin || false;

            if(isAdminUser){
                document.getElementById("adminBtn").style.display = "block";
            }
        } catch (e) {
            currentUserId = "error_user";
            currentDisplayName = "error_name";
            isAdminUser = false;
        }
    }

    // 修復：折疊展開功能
    function toggleCollapse() {
        const content = document.getElementById("collapseContent");
        const btn = document.querySelector(".collapse-btn");
        if (!content.style.maxHeight || content.style.maxHeight === "0px") {
            content.style.maxHeight = "800px";
            btn.innerText = "收合：▼";
        } else {
            content.style.maxHeight = "0px";
            btn.innerText = "展開：▶";
        }
    }

    function getSignDate() {
        const now = new Date();
        const y = now.getFullYear();
        m = now.getMonth() + 1;
        d = now.getDate();
        return `${y}/${m}/${d}`;
    }

    function getFullDateTime() {
        const now = new Date();
        const y = now.getFullYear();
        m = now.getMonth() + 1;
        d = now.getDate();
        
        let hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const period = hours >= 12 ? "下午" : "上午";
        
        if (hours > 12) hours -= 12;
        if (hours === 0) hours = 12;
        
        const timeStr = `${period} ${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        return `${y}/${m}/${d} ${timeStr}`;
    }

    // 檢查姓名是否重複
    function isNameExists(name) {
        return allRecords.some(row => row[0]?.trim() === name.trim());
    }

    async function submitSignup() {
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const custom = document.getElementById("customItem").value.trim();
        const checks = document.querySelectorAll(".checkbox-group input:checked");
        
        let items = Array.from(checks).map(c => c.value);
        const hasOther = items.includes("其他");

        if (hasOther) {
            items = items.filter(i => i !== "其他");
            if (!custom) { showMsg("請輸入其他項目", false); return; }
            items.push(custom);
        }

        if (!name) { showMsg("請輸入姓名", false); return; }
        if (items.length === 0) { showMsg("請選擇項目", false); return; }
        
        // 防重複報名
        if (isNameExists(name)) {
            showMsg("❌ 此姓名已報名過，無法重複報名", false);
            return;
        }

        btn.disabled = true;
        btn.innerText = "⏳ 提交中...";

        try {
            const form = new URLSearchParams();
            form.append("name", name);
            form.append("item", items.join("、"));
            form.append("userId", currentUserId);
            form.append("displayName", currentDisplayName);
            form.append("signDate", getSignDate());
            form.append("submitTime", getFullDateTime());

            const res = await fetch(WEB_APP_URL, { method: "POST", body: form });
            const data = await res.json();

            if (data.success) {
                showMsg("✅ 報名成功", true);
                document.getElementById("name").value = "";
                document.getElementById("customItem").value = "";
                document.querySelectorAll(".checkbox-group input").forEach(c => c.checked = false);
                document.getElementById("customItem").style.display = "none";
                loadList();
            } else {
                showMsg("❌ 失敗：" + (data.message || ""), false);
            }
        } catch (err) {
            showMsg("❌ 連線異常", false);
        } finally {
            btn.disabled = false;
            btn.innerText = "✅ 送出報名";
        }
    }

    function loadList() {
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ mode: "read" })
        })
        .then(res => res.json())
        .then(data => {
            if (!data.success || data.records.length === 0) {
                document.getElementById("list").innerHTML = "目前無報名資料";
                allRecords = [];
                return;
            }
            allRecords = data.records;
            renderList(allRecords);
        })
        .catch(() => {
            document.getElementById("list").innerHTML = "目前無報名資料";
            allRecords = [];
        });
    }

	// 首頁名單：隱藏修改刪除
    function renderList(records) {
        let html = "";
        records.forEach(row => {
            const name = row[0] || "";
            const item = row[1] || "";
            
            html += `
            <div class="item">
                <span class="name">${name}</span>
                <span class="itemText">：${item}</span>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    function searchList() {
        const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!keyword) { renderList(allRecords); return; }
        const filtered = allRecords.filter(row => {
            const name = (row[0] || "").toLowerCase();
            const item = (row[1] || "").toLowerCase();
            return name.includes(keyword) || item.includes(keyword);
        });
        renderList(filtered);
    }

    // 基礎彈窗
    function openModal() {
        document.getElementById("adminModal").classList.add("show");
    }
    function closeModal() {
        document.getElementById("adminModal").classList.remove("show");
    }

    // === 名單管理功能 ===
    function openListManager() {
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        closeModal();
        document.getElementById("listManagerModal").classList.add("show");
        renderManagerList(allRecords);
    }
    function closeListManager() {
        document.getElementById("listManagerModal").classList.remove("show");
    }
	
	// 載入名單 + 點擊等待特效
	function refreshManagerList(){
		let btn = document.querySelector(".refresh-top-btn");
		btn.innerText = "⏳ 載入中...";
		btn.disabled = true;
		
		loadList();
		setTimeout(()=>{
			renderManagerList(allRecords);
			btn.innerText = "🔄 載入名單";
			btn.disabled = false;
			showMsg("✅ 名單已重新載入",true);
		},600)
	}
	
    function renderManagerList(records) {
        let html = "";
        records.forEach(row => {
            const name = row[0] || "";
            const item = row[1] || "";
            html += `
            <div class="item">
                <span class="name">${name}</span>
                <span class="itemText">：${item}</span>
                <div class="admin-row">
                    <button style="background:linear-gradient(135deg,#2D6A99,#003366)" onclick="managerEdit('${name}')">修改</button>
                    <button style="background:linear-gradient(135deg,#D83A56,#cc0000)" onclick="managerDelete('${name}')">刪除</button>
                </div>
            </div>`;
        });
        document.getElementById("managerList").innerHTML = html || "無資料";
    }
    function searchManagerList() {
        const keyword = document.getElementById("managerSearch").value.trim().toLowerCase();
        if (!keyword) { renderManagerList(allRecords); return; }
        const filtered = allRecords.filter(row => {
            const name = (row[0] || "").toLowerCase();
            const item = (row[1] || "").toLowerCase();
            return name.includes(keyword) || item.includes(keyword);
        });
        renderManagerList(filtered);
    }
	// 管理修改 - 雙重防呆 + 執行中特效
    function managerEdit(name) {
		if(!confirm("⚠️ 確定要修改這筆資料嗎？")) return;
        const newItem = prompt("修改項目：", "");
        if(!newItem) return;
		
		showMsg("⏳ 修改處理中...", true);
        fetch(WEB_APP_URL,{
            method:"POST",
            body:new URLSearchParams({ name, item: newItem, userId: currentUserId, displayName: currentDisplayName, signDate: getSignDate() })
        }).then(()=>{ 
            showMsg("✅ 修改完成", true);
            loadList();
            renderManagerList(allRecords);
        }).catch(()=>showMsg("❌ 修改失敗", false));
    }
	// 管理刪除 - 雙重防呆 + 執行中特效
    function managerDelete(name){
		if(!confirm("⚠️ 確定永久刪除？此動作無法復原！")) return;
		
		showMsg("⏳ 刪除處理中...", true);
        fetch(WEB_APP_URL,{ method:"POST", body:new URLSearchParams({ mode:"delete", name }) })
        .then(()=>{ 
            showMsg("✅ 已刪除", true);
            loadList();
            renderManagerList(allRecords);
        }).catch(()=>showMsg("❌ 刪除失敗", false));
    }
    // === 名單管理結束 ===

    function editItem(name) {
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        const newItem = prompt("修改項目：", "");
        if(!newItem) return;
        fetch(WEB_APP_URL,{
            method:"POST",
            body:new URLSearchParams({ name, item: newItem, userId: currentUserId, displayName: currentDisplayName, signDate: getSignDate() })
        }).then(()=>{ 
            showMsg("✅ 修改完成", true); 
            loadList(); 
        }).catch(()=>showMsg("❌ 修改失敗", false));
    }

    function deleteItem(name){
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        if(!confirm("確定刪除？")) return;
        fetch(WEB_APP_URL,{ method:"POST", body:new URLSearchParams({ mode:"delete", name }) })
        .then(()=>{ 
            showMsg("✅ 已刪除", true); 
            loadList(); 
        }).catch(()=>showMsg("❌ 刪除失敗", false));
    }

    function updateSheet2Date() {
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        const input = prompt("請輸入新日期（範例：3月16日）", "");
        if (!input) return;
        const year = new Date().getFullYear();
        let month = input.match(/(\d+)月/)?.[1];
        let day = input.match(/(\d+)日/)?.[1];
        if (!month || !day) {
            showMsg("❌ 格式錯誤，請輸入 3月16日", false);
            return;
        }
        const newDate = `${year}/${month}/${day}`;
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ mode: "updateSheet2Date", newDate: newDate })
        }).then(() => {
            showMsg(`✅ 日期已更新：${newDate}`, true);
            closeModal();
        }).catch(() => showMsg("❌ 更新失敗", false));
    }

    function clearSheet1() {
        if(!isAdminUser){ showMsg("❌ 僅管理員可操作", false); return; }
        if (!confirm("⚠️ 確定清空工作表1？無法復原！")) return;
        
        fetch(WEB_APP_URL, {
            method: "POST",
            body: new URLSearchParams({ mode: "clearSheet1", userId: currentUserId })
        }).then(() => {
            showMsg("✅ 已清空", true);
            loadList();
            closeModal();
        }).catch(()=>showMsg("❌ 清空失敗", false));
    }

    function showMsg(text, success) {
        const msg = document.getElementById("msg");
        msg.innerText = text;
        msg.className = "msg " + (success ? "success" : "error");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2800);
    }
</script>
</body>
</html>
